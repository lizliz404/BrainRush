<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brain Rush｜60 秒数学与单词反应练习</title>
    <meta name="description" content="Brain Rush 是一个 60 秒反应练习小游戏，支持数学速算、单词选择、错题记录和本地成绩。" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Fredoka', 'sans-serif'],
            },
            colors: {
              game: {
                bg: '#1e1b4b', // Deep indigo
                accent: '#4f46e5',
                correct: '#22c55e',
                wrong: '#ef4444',
                player: '#06b6d4', // Cyan
                text: '#f8fafc'
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        overflow: hidden; /* Prevent scrolling */
        background-color: #1e1b4b;
        color: white;
        touch-action: none; /* Prevent mobile pull-to-refresh */
      }

      .animate-fade-in {
        animation: fade-in 220ms ease-out both;
      }

      .animate-fade-out {
        animation: fade-out 220ms ease-out both;
      }

      .animate-pop-in {
        animation: pop-in 220ms ease-out both;
      }

      .animate-pop-out {
        animation: pop-out 220ms ease-out both;
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      @keyframes pop-in {
        from { opacity: 0; transform: translateY(10px) scale(0.985); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes pop-out {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to { opacity: 0; transform: translateY(8px) scale(0.985); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
